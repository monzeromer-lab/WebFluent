<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
        // GitHub Pages SPA redirect
        var seg = location.pathname.split('/').filter(Boolean);
        var baseSeg = location.hostname.includes('github.io') && seg.length > 0 ? 1 : 0;
        var path = '/' + seg.slice(baseSeg).join('/');
        var url = location.origin + '/' + seg.slice(0, baseSeg).join('/') + '/?p=' + encodeURIComponent(path);
        location.replace(url);
    </script>
</head>
<body></body>
</html>
